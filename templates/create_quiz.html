{% extends "layout.html" %}
{% block title %}Create Quiz{% endblock %}
{% block content %}
<div class="card">
  <h2> Create a New Quiz</h2>

  <form method="post" enctype="multipart/form-data" class="quiz-form">
    <label class="form-label" for="title">
       Quiz Title
    </label>
    <input type="text" id="title" name="title" required>

    <label class="form-label" for="class_no">
       Class Number
    </label>
    <select id="class_no" name="class_no" required>
      {% for cls in classes %}
        <option value="{{ cls.class_no }}">{{ cls.class_no }}</option>
      {% endfor %}
    </select>

    <label class="form-label" for="quiz_source">Quiz Source</label>
    <div style="display:flex; gap: 14px; margin: 8px 0 16px; flex-wrap: wrap;">
      <label style="display:flex; align-items:center; gap: 8px;">
        <input type="radio" name="quiz_source" value="upload" checked>
        Upload Excel
      </label>
      <label style="display:flex; align-items:center; gap: 8px;">
        <input type="radio" name="quiz_source" value="bank">
        Random from Question Bank
      </label>
    </div>

    <label class="form-label" for="total_marks">
       Total Marks
    </label>
    <input type="number" id="total_marks" name="total_marks" required>

    <label class="form-label" for="duration">
       Duration (minutes)
    </label>
    <input type="number" id="duration" name="duration" required>

    <div id="uploadSection">
      <label class="form-label" for="file">
         Upload Questions File (.xlsx)
      </label>
      <input type="file" id="file" name="file" accept=".xlsx,.xls" required>

      <label style="display:flex; align-items:center; gap: 10px; margin-top: 10px;">
        <input type="checkbox" id="add_to_bank" name="add_to_bank">
        Add uploaded questions to the Question Bank
      </label>
    </div>

    <div id="bankSection" style="display:none;">
      <label class="form-label" for="bank_count">
        Number of Questions (from bank)
      </label>
      <input type="number" id="bank_count" name="bank_count" min="1">
    </div>

    <button type="button" class="btn-secondary" onclick="window.location.href='/download_quiz_template'">
      Download Quiz Template
    </button>
    <button type="button" class="btn-secondary" onclick="window.location.href='/404'">
      Get Help
    </button>
    <button type="submit" class="btn">
      Create Quiz
    </button>
  </form>
</div>
<script>
  (function () {
    const uploadSection = document.getElementById("uploadSection");
    const bankSection = document.getElementById("bankSection");
    const fileInput = document.getElementById("file");
    const bankCountInput = document.getElementById("bank_count");

    function updateSource() {
      const selected = document.querySelector("input[name='quiz_source']:checked");
      const isBank = selected && selected.value === "bank";

      if (uploadSection) uploadSection.style.display = isBank ? "none" : "block";
      if (bankSection) bankSection.style.display = isBank ? "block" : "none";

      if (fileInput) fileInput.required = !isBank;
      if (bankCountInput) bankCountInput.required = isBank;
    }

    document.querySelectorAll("input[name='quiz_source']").forEach((radio) => {
      radio.addEventListener("change", updateSource);
    });

    updateSource();
  })();
</script>
{% endblock %}
