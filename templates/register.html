
{% extends "layout.html" %}
{% block content %}
<div class="container" style="margin-top: 0px; margin-bottom: 50px; display: flex; justify-content: center;">
	<div class="card" style="max-width: 500px; width: 100%;">
		<div class="text-center mb-4">
			<h2 class="fw-bold">Register</h2>
			<p class="text-muted">Create your account</p>
		</div>
		{# Notifications are shown via global toast in layout.html #}
		<form method="post" autocomplete="off">
			<div class="mb-3">
				<label for="name" class="form-label">Full Name</label>
				<input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
			</div>
			<div class="mb-3">
				<label for="email" class="form-label">Email address</label>
				<input type="email" class="form-control" id="email" name="email" placeholder="Enter email" required>
			</div>
			<div class="mb-3">
				<label for="password" class="form-label">Password</label>
				<input type="password" class="form-control" id="password" name="password" placeholder="Create password" required>
			</div>
			<div class="mb-3">
				<label for="reg_no" class="form-label">Registration Number</label>
				<input type="text" class="form-control" id="reg_no" name="reg_no" placeholder="Enter registration number">
			</div>
			<div class="mb-3">
				<label for="contact" class="form-label">Contact</label>
				<input type="text" class="form-control" id="contact" name="contact" placeholder="Enter contact number">
			</div>
			<div class="mb-3">
				<label for="role" class="form-label">Role</label>
				<select class="form-select" id="role" name="role" required>
					<option value="">Select role</option>
					<option value="student">Student</option>
					<option value="faculty">Faculty</option>
				</select>
			</div>
			<button type="submit" class="btn btn-success w-100">Register</button>
		</form>
		<div class="mt-3 text-center">
			<span class="text-muted">Already have an account?</span>
			<a href="/login">Login</a>
		</div>
	</div>
</div>
{% endblock %}
