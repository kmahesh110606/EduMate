{% extends "layout.html" %}
{% block content %}
<div class="container">
  <h2>My Profile</h2>

  {# Notifications are shown via global toast in layout.html #}

  <form method="post" class="profile-form">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" value="{{ user.name }}" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" value="{{ user.email }}" required>

    <label for="reg_no">Registration Number</label>
    <input type="text" id="reg_no" name="reg_no" value="{{ user.reg_no }}">

    <label for="contact">Contact</label>
    <input type="text" id="contact" name="contact" value="{{ user.contact }}">

    <label for="old_password">Old Password (required to change password)</label>
    <input type="password" id="old_password" name="old_password" placeholder="Enter current password">

    <label for="password">New Password (leave blank to keep current)</label>
    <input type="password" id="password" name="password" placeholder="Enter new password">

    <button type="submit" class="btn">Update Profile</button>
  </form>

  <div class="card" style="margin: 24px 0 0 0; padding: 28px; border: 2px solid rgba(176, 0, 32, 0.25);">
    <h3 style="color:#b00020;">Delete Account</h3>
    <p>This action is permanent. Your data will be removed from the system.</p>
    <p style="margin-top: 10px;">
      Type <strong>delete {{ user.name }}</strong> and enter your password to confirm.
    </p>

    <form method="POST" action="{{ url_for('delete_user') }}" style="margin-top: 12px;">
      <label for="confirm_text">Confirmation</label>
      <input id="confirm_text" name="confirm_text" type="text" placeholder="delete {{ user.name }}" required>

      <label for="delete_password">Password</label>
      <input id="delete_password" name="password" type="password" placeholder="Enter your password" required>

      <button type="submit" class="btn" style="background: linear-gradient(135deg, #b00020, #7f0a1c);"><svg width="24" height="24" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 1.75a3.25 3.25 0 0 1 3.245 3.066L15.25 5h5.25a.75.75 0 0 1 .102 1.493L20.5 6.5h-.796l-1.28 13.02a2.75 2.75 0 0 1-2.561 2.474l-.176.006H8.313a2.75 2.75 0 0 1-2.714-2.307l-.023-.174L4.295 6.5H3.5a.75.75 0 0 1-.743-.648L2.75 5.75a.75.75 0 0 1 .648-.743L3.5 5h5.25A3.25 3.25 0 0 1 12 1.75Zm6.197 4.75H5.802l1.267 12.872a1.25 1.25 0 0 0 1.117 1.122l.127.006h7.374c.6 0 1.109-.425 1.225-1.002l.02-.126L18.196 6.5ZM13.75 9.25a.75.75 0 0 1 .743.648L14.5 10v7a.75.75 0 0 1-1.493.102L13 17v-7a.75.75 0 0 1 .75-.75Zm-3.5 0a.75.75 0 0 1 .743.648L11 10v7a.75.75 0 0 1-1.493.102L9.5 17v-7a.75.75 0 0 1 .75-.75Zm1.75-6a1.75 1.75 0 0 0-1.744 1.606L10.25 5h3.5A1.75 1.75 0 0 0 12 3.25Z" fill="#fff"/></svg> Delete My Account</button>
    </form>
  </div>
</div>
{% endblock %}
