{% extends "layout.html" %}
{% block content %}
<div class="container">
  <h2>My Profile</h2>

  {# Notifications are shown via global toast in layout.html #}

  <form method="post" class="profile-form">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" value="{{ user.name }}" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" value="{{ user.email }}" required>

    <label for="reg_no">Registration Number</label>
    <input type="text" id="reg_no" name="reg_no" value="{{ user.reg_no }}">

    <label for="contact">Contact</label>
    <input type="text" id="contact" name="contact" value="{{ user.contact }}">

    <label for="password">New Password (leave blank to keep current)</label>
    <input type="password" id="password" name="password" placeholder="Enter new password">

    <button type="submit" class="btn">Update Profile</button>
  </form>

  <div class="card" style="margin: 24px 0 0 0; padding: 28px; border: 2px solid rgba(176, 0, 32, 0.25);">
    <h3 style="color:#b00020;">Delete Account</h3>
    <p>This action is permanent. Your data will be removed from the system.</p>
    <p style="margin-top: 10px;">
      Type <strong>delete {{ user.name }}</strong> and enter your password to confirm.
    </p>

    <form method="POST" action="{{ url_for('delete_user') }}" style="margin-top: 12px;">
      <label for="confirm_text">Confirmation</label>
      <input id="confirm_text" name="confirm_text" type="text" placeholder="delete {{ user.name }}" required>

      <label for="delete_password">Password</label>
      <input id="delete_password" name="password" type="password" placeholder="Enter your password" required>

      <button type="submit" class="btn" style="background: linear-gradient(135deg, #b00020, #7f0a1c);">Delete My Account</button>
    </form>
  </div>
</div>
{% endblock %}
