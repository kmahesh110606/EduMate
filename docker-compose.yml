services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:5253@db:5432/lms_db
      - SECRET_KEY=change-me
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy


  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=5253
      - POSTGRES_DB=lms_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lms_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
